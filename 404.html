<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Sujal Khamar</title>
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Syne:wght@500;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#f5f3ee; --text:#1a1714; --text2:#4a4540; --accent:#c4622d; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Syne',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:grid; place-items:center; text-align:center; }
    .wrap { padding: 2rem; }
    .code { font-family:'DM Mono',monospace; font-size:7rem; color:var(--accent); line-height:1; letter-spacing:-0.05em; }
    h1 { font-family:'DM Serif Display',serif; font-size:2rem; font-weight:400; margin:1rem 0 0.5rem; }
    p { color:var(--text2); margin-bottom:2rem; }
    a { display:inline-block; background:var(--accent); color:#fff; padding:0.75rem 1.8rem; border-radius:999px; font-size:0.9rem; font-weight:700; text-decoration:none; transition:opacity 0.2s; }
    a:hover { opacity:0.85; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>This page doesn't exist — but my portfolio does.</p>
    <a href="./index.html">← Back to Home</a>
  </div>
</body>
</html>
